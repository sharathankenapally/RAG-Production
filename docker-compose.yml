services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EMBEDDING_MODEL=nomic-embed-text
      - EMBEDDING_DIM=768
      - LLM_MODEL=llama3
      - COLLECTION_NAME=rag_documents
    depends_on:
      - qdrant
      - redis

volumes:
  redis_data:
